careerProfile:
  title: Career profile
  summary: >-
    Loren is the founder and Principal Consultant of Innovise Technologies,
    bringing 15+ years of experience helping small and mid-sized businesses
    solve complex software challenges. He has operated as a fractional CTO,
    engineering lead, and hands-on architect for clients across multiple
    industries -- stepping in at the level each organization actually needs.
    Loren's core value is bridging the gap between business goals and
    technical execution: he speaks both languages fluently, and has built,
    led, and scaled engineering orgs and teams. His recent work includes AI
    integration and workflow modernisation, helping teams leverage tools
    like AWS Bedrock and Google Cloud AI to build smarter systems and work
    more efficiently.

